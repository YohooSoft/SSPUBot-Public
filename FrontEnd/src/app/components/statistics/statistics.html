<div class="container mx-auto p-4">
  <div *ngIf="loading" class="flex justify-center items-center h-96">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-gray-900"></div>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- File Count by Source -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-4 relative">
      <button
        (click)="openModal(sourceCountOption, '各来源文件数量统计')"
        class="absolute top-4 right-4 z-10 p-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors duration-200 shadow-md"
        title="放大查看">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
        </svg>
      </button>
      <div echarts [options]="sourceCountOption" class="h-96"></div>
    </div>

    <!-- Daily File Count -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-4 relative">
      <button
        (click)="openModal(dailyCountOption, '每日发布文件数量')"
        class="absolute top-4 right-4 z-10 p-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors duration-200 shadow-md"
        title="放大查看">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
        </svg>
      </button>
      <div echarts [options]="dailyCountOption" class="h-96"></div>
    </div>

    <!-- Word Frequency Chart -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-4 md:col-span-2 relative">
      <button
        (click)="openModal(wordCloudOption, '关键词词频统计')"
        class="absolute top-4 right-4 z-10 p-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors duration-200 shadow-md"
        title="放大查看">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
        </svg>
      </button>
      <div echarts [options]="wordCloudOption" class="h-96"></div>
    </div>
  </div>

  <!-- Modal for enlarged chart -->
  <div *ngIf="showModal"
       class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4"
       (click)="closeModal()">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl w-full max-w-6xl max-h-[90vh] flex flex-col"
         (click)="$event.stopPropagation()">
      <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-700">
        <h2 class="text-2xl font-bold">{{modalChartTitle}}</h2>
        <button
          (click)="closeModal()"
          class="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200"
          title="关闭">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="flex-1 p-4 overflow-auto">
        <div echarts [options]="modalChartOption" class="h-[70vh]"></div>
      </div>
    </div>
  </div>
</div>
