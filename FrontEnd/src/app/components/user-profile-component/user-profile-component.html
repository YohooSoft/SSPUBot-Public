<div class="user-profile-dropdown">
  <h2 class="text-base cursor-pointer hover:text-blue-600 transition-colors" (click)="toggleDropdown()">
    {{ displayName }} ▼
  </h2>
  
  <div *ngIf="isDropdownOpen" class="dropdown-menu">
    <div class="dropdown-item" (click)="navigateToProfile()">
      用户资料
    </div>
    <div class="dropdown-item" (click)="navigateToBotMemory()">
      机器人记忆
    </div>
    <div class="dropdown-item" (click)="navigateToSettings()">
      设置
    </div>
    <div *ngIf="isAdmin" class="dropdown-item" (click)="navigateToAdmin()">
      管理员
    </div>
    <div class="dropdown-divider"></div>
    <div class="dropdown-item logout" (click)="logout()">
      登出
    </div>
  </div>
</div>
