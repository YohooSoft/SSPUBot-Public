<div class="flex flex-col items-start gap-8 w-full">
    <!-- Change Password Section -->
    <div class="w-full">
        <h2 class="mb-2 text-24px">修改密码</h2>
        <div class="w-full h-px bg-gray-300 mb-3"></div>
        <div class="flex flex-col ml-6 mb-3">
            <div class="text-14px mb-2" style="color: gray;">
                定期修改密码可以提高账号安全性。密码长度至少为6位。
            </div>
        </div>

        <div class="ml-6 max-w-md">
            <div class="mb-4">
                <label class="block text-14px font-bold mb-2">当前密码</label>
                <input type="password" [(ngModel)]="passwordForm.oldPassword" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="请输入当前密码" />
            </div>

            <div class="mb-4">
                <label class="block text-14px font-bold mb-2">新密码</label>
                <input type="password" [(ngModel)]="passwordForm.newPassword" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="请输入新密码（至少6位）" />
            </div>

            <div class="mb-4">
                <label class="block text-14px font-bold mb-2">确认新密码</label>
                <input type="password" [(ngModel)]="passwordForm.confirmPassword" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="请再次输入新密码" />
            </div>

            <button (click)="changePassword()" 
                    [disabled]="changingPassword"
                    class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600 disabled:bg-gray-400 disabled:cursor-not-allowed">
                {{ changingPassword ? '修改中...' : '修改密码' }}
            </button>

            <div *ngIf="passwordMessage" class="mt-3 text-14px" 
                 [class.text-green-600]="passwordMessageType === 'success'"
                 [class.text-red-600]="passwordMessageType === 'error'">
                {{ passwordMessage }}
            </div>
        </div>
    </div>

    <!-- AI Privacy Settings -->
    <div class="w-full">
        <h2 class="mb-2 text-24px">AI 隐私设置</h2>
        <div class="w-full h-px bg-gray-300 mb-3"></div>
        <div class="flex flex-col ml-6 mb-3">
            <div class="text-14px mb-2" style="color: gray;">
                控制 AI 聊天机器人可以访问您的哪些个人信息。启用后，AI 会在对话中使用这些信息提供更个性化的回复。
            </div>
        </div>

        <div *ngIf="loadingSettings" class="ml-6 text-14px text-gray-500">加载设置中...</div>

        <div *ngIf="!loadingSettings" class="ml-6">
            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowBirthDate" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowBirthDate')">
                        允许 AI 访问我的出生年月
                    </span>
                </label>
            </div>

            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowIsSchoolStudent" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowIsSchoolStudent')">
                        允许 AI 知道我是否本校学生
                    </span>
                </label>
            </div>

            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowEnrollmentDate" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowEnrollmentDate')">
                        允许 AI 访问我的入学时间
                    </span>
                </label>
            </div>

            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowGraduationDate" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowGraduationDate')">
                        允许 AI 访问我的毕业时间
                    </span>
                </label>
            </div>

            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowEducationLevel" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowEducationLevel')">
                        允许 AI 访问我的最高学历
                    </span>
                </label>
            </div>

            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowGraduatedSchool" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowGraduatedSchool')">
                        允许 AI 访问我的毕业学校
                    </span>
                </label>
            </div>

            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowHobbies" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowHobbies')">
                        允许 AI 访问我的爱好
                    </span>
                </label>
            </div>

            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowFromLocation" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowFromLocation')">
                        允许 AI 知道我来自哪里
                    </span>
                </label>
            </div>

            <div class="flex flex-row items-center mb-1">
                <input type="checkbox" [(ngModel)]="aiSettings.allowWantToGo" class="w-4 h-4"
                       (change)="saveAiSettings()"/>
                <label>
                    <span class="ml-2 font-bold text-14px cursor-pointer" style="user-select: none;"
                          (click)="toggleAiSetting('allowWantToGo')">
                        允许 AI 知道我想去哪里
                    </span>
                </label>
            </div>
        </div>

        <div class="flex flex-col ml-6 mt-3">
            <div class="text-12px mb-1" style="color: gray;">
                所有设置默认关闭，您可以根据需要选择性开启。
            </div>
            <div class="text-12px mb-1" style="color: gray;">
                这些信息仅在与 AI 聊天时使用，不会被其他用户看到。
            </div>
        </div>
    </div>
</div>
