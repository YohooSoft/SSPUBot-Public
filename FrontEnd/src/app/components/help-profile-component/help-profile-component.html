<div class="help-content">
  <div *ngIf="loading" class="loading">
    <p>加载中...</p>
  </div>

  <div *ngIf="!loading && !error && content" class="content-wrapper">
    <h1>{{ content.title }}</h1>
    
    <section class="description">
      <p>{{ content.description }}</p>
    </section>

    <section class="features">
      <h2>主要功能</h2>
      <ul>
        <li *ngFor="let feature of content.features">{{ feature }}</li>
      </ul>
    </section>

    <section class="usage">
      <h2>使用方法</h2>
      <ol>
        <li *ngFor="let step of content.usage">{{ step }}</li>
      </ol>
    </section>
  </div>

  <div *ngIf="error" class="error">
    <p>加载内容失败，请稍后重试。</p>
  </div>
</div>
