<!-- 现代浏览器注册表单 -->
<form (ngSubmit)="register()" #registerForm="ngForm" *ngIf="deviceInfo?.browser !== 'Unknown'"
      class="max-w-md mx-auto mt-8 p-6 bg-white rounded-lg shadow-md flex flex-col">

    <!-- 标题 (可选，根据需要保留或删除) -->
    <h2 class="text-xl font-bold mb-4 text-center text-gray-800">用户注册</h2>

    <div>
        <label for="username">用户名：</label>
        <input type="text" id="username" name="username" [(ngModel)]="username" required
               class="w-full mb-2 p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    </div>

    <div>
        <label for="email">邮箱：</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" required email
               class="w-full mb-2 p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    </div>

    <div>
        <label for="password">密码：</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" required minlength="6"
               class="w-full mb-2 p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    </div>

    <div>
        <label for="confirmPassword">确认密码：</label>
        <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required
               class="w-full mb-2 p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400"/>
    </div>

    <!-- 错误信息展示 -->
    <p *ngIf="errorMessage" style="color:red;" class="text-sm mt-1">{{ errorMessage }}</p>

    <!-- 按钮区域 -->
    <div class="flex items-center flex-row mt-6">
        <!-- 注册按钮 (主操作) -->
        <button type="submit" [disabled]="registerForm.invalid || password !== confirmPassword"
                class="flex flex-col justify-center items-center w-36 h-10 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-medium py-2 px-4 rounded-md shadow-sm transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-400"
                aria-label="注册">
            <span>注册</span>
        </button>

        <!-- 返回登录按钮 (副操作) -->
        <button type="button" (click)="navigateToLogin()"
                class="ml-2 w-36 h-10 flex flex-col justify-center items-center bg-transparent border border-blue-600 text-blue-600 hover:bg-blue-50 font-medium py-2 px-4 rounded-md transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-200"
                aria-label="返回登录">
            去登录
        </button>
    </div>
</form>
