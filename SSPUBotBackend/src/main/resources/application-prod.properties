spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SSPU;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=username
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

spring.session.jdbc.initialize-schema=always
# WARNING: Using 'update' is not recommended for production!
# Consider using Flyway or Liquibase for better control over schema changes.
# See DATABASE_MIGRATION_GUIDE.md for migration instructions.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl